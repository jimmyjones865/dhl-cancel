<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>DHL Sendung stornieren</title>
    <style>
      /* Nord palette */
      :root {
        --nord0: #2e3440; /* Polar Night */
        --nord1: #3b4252;
        --nord2: #434c5e;
        --nord3: #4c566a;
        --nord4: #d8dee9; /* Snow Storm */
        --nord5: #e5e9f0;
        --nord6: #eceff4;
        --nord7: #8fbcbb; /* Frost */
        --nord8: #88c0d0;
        --nord9: #81a1c1;
        --nord10: #5e81ac;
        --nord11: #bf616a; /* Aurora red */
        --nord13: #ebcb8b; /* Aurora yellow */
        --nord14: #a3be8c; /* Aurora green */
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--nord0);
        color: var(--nord6);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        cursor: default;
      }
      .app {
        width: 100%;
        max-width: 720px;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.25rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        color: var(--nord4);
        text-transform: uppercase;
      }
      .sub {
        margin: 0 0 2.5rem;
        color: var(--nord3);
        font-size: 0.9rem;
      }
      .indicator {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        color: var(--nord8);
        font-size: 1rem;
        margin-bottom: 2rem;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--nord8);
        box-shadow: 0 0 0 0 rgba(136, 192, 208, 0.6);
        animation: pulse 1.6s ease-out infinite;
      }
      @keyframes pulse {
        0%   { box-shadow: 0 0 0 0 rgba(136, 192, 208, 0.6); }
        70%  { box-shadow: 0 0 0 14px rgba(136, 192, 208, 0); }
        100% { box-shadow: 0 0 0 0 rgba(136, 192, 208, 0); }
      }
      .banner {
        margin-top: 1rem;
        padding: 2rem 1.5rem;
        border-radius: 12px;
        background: var(--nord1);
        color: var(--nord4);
        min-height: 7rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s ease, color 0.2s ease;
      }
      .banner.idle .status { color: var(--nord3); font-size: 1rem; }
      .banner.ok   { background: var(--nord14); color: var(--nord0); }
      .banner.err  { background: var(--nord11); color: var(--nord0); }
      .banner.busy { background: var(--nord2); color: var(--nord4); }
      .status {
        font-size: 2.25rem;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      .detail {
        margin-top: 0.5rem;
        font-size: 1rem;
        font-weight: 500;
        max-width: 100%;
        word-break: break-word;
      }
      .ship {
        margin-top: 0.4rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.95rem;
        opacity: 0.85;
      }
      /* Manual entry */
      .manual {
        margin-top: 1.5rem;
        display: flex;
        gap: 0.5rem;
        justify-content: center;
      }
      .manual input {
        flex: 1;
        max-width: 320px;
        padding: 0.6rem 0.8rem;
        border-radius: 8px;
        border: 1px solid var(--nord3);
        background: var(--nord1);
        color: var(--nord6);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 1rem;
      }
      .manual input:focus { outline: 2px solid var(--nord8); }
      .manual button {
        padding: 0.6rem 1rem;
        border-radius: 8px;
        border: 0;
        background: var(--nord10);
        color: var(--nord6);
        font-weight: 600;
        cursor: pointer;
      }
      .manual button:hover { background: var(--nord9); }
      /* hidden but still focusable input that captures the scanner */
      .scan-input {
        position: absolute;
        left: -10000px;
        top: -10000px;
        width: 1px;
        height: 1px;
        opacity: 0;
      }
      footer {
        margin-top: 2rem;
        color: var(--nord3);
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>DHL Sendung stornieren</h1>
      <p class="sub">Etikett scannen, um die Sendung zu stornieren.</p>

      <div class="indicator" id="indicator">
        <span class="dot"></span>
        <span>Bereit zum Scannen…</span>
      </div>

      <div class="banner idle" id="banner" role="status" aria-live="polite">
        <div class="status">—</div>
      </div>

      <form class="manual" id="manual-form" autocomplete="off">
        <input
          id="manual"
          type="text"
          placeholder="Sendungsnummer manuell eingeben"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button type="submit">Stornieren</button>
      </form>

      <input
        id="scan"
        class="scan-input"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        inputmode="none"
        aria-hidden="true"
      />

      <footer>Self-hosted • keine Anmeldung • keine lokale Konfiguration</footer>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
